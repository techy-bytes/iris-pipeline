apiVersion: apps/v1
kind: Deployment
metadata:
  name: iris-api-loadtest
  labels:
    app: iris-api-loadtest
spec:
  replicas: 3  # More replicas for load testing
  selector:
    matchLabels:
      app: iris-api-loadtest
  template:
    metadata:
      labels:
        app: iris-api-loadtest
    spec:
      serviceAccountName: telemetry-access
      containers:
      - name: iris-api
        image: us-central1-docker.pkg.dev/${PROJECT_ID}/iris-api/iris-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: PYTHONPATH
          value: "/app"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: GOOGLE_CLOUD_PROJECT
          value: "${PROJECT_ID}"
        - name: GCP_PROJECT
          value: "${PROJECT_ID}"
        # Load testing optimization enabled
        - name: LOAD_TEST_MODE
          value: "true"
        resources:
          requests:
            memory: "512Mi"   # More memory for load testing
            cpu: "500m"       # More CPU for load testing
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: iris-api-loadtest-service
  labels:
    app: iris-api-loadtest
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
  selector:
    app: iris-api-loadtest