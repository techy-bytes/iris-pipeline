name: CI Pipeline

on:
  push:
    branches: [ dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # cache pip dependencies to speed up future runs

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate test and training report
        # Run tests and training, redirecting output to a markdown report.
        # Use `|| true` to ensure the workflow continues to the CML step even if tests fail.
        run: |
          echo "## Pytest Results" > report.md
          pytest >> report.md 2>&1 || true
          
          echo -e "\n## Training Metrics" >> report.md
          python src/train.py >> report.md 2>&1

      - name: Setup CML
        uses: iterative/cml@v1

      - name: Post report to PR with CML
        # This step only runs for pull request events
        if: github.event_name == 'pull_request'
        env:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
        run: cml comment create report.md