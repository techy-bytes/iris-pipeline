name: CI/CD Pipeline

on:
  push:
    branches: [ dev, main, '**' ]  # Run on all branches
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: us-central1
  SERVICE: iris-api
  REGION: us-central1 # Using REGION for consistency

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          echo "# IRIS Pipeline - Model Evaluation Report" > report.md
          echo "" >> report.md
          echo "## Test Results" >> report.md
          pytest -v >> report.md 2>&1 || true

      - name: Generate training report
        run: |
          echo -e "\n## Traditional Model Training Metrics" >> report.md
          python src/train.py >> report.md 2>&1

      - name: Run Gemma Model Evaluation
        run: |
          echo -e "\n## Gemma Model Evaluation (Base vs Fine-tuned)" >> report.md
          echo "🚀 Running comprehensive Gemma model comparison..." >> report.md
          echo "" >> report.md
          python src/gemma_evaluation.py >> report.md 2>&1
          
      - name: Generate comprehensive evaluation metrics
        run: |
          echo -e "\n## Evaluation Metrics Comparing Base and Fine-tuned Model" >> report.md
          echo "" >> report.md
          if [ -f "gemma_metrics.csv" ]; then
            echo "### Performance Metrics Comparison" >> report.md
            echo "\`\`\`csv" >> report.md
            cat gemma_metrics.csv >> report.md
            echo "\`\`\`" >> report.md
            echo "" >> report.md
          fi
          
          if [ -f "gemma_evaluation_results.json" ]; then
            python scripts/generate_report.py >> report.md
          else
            echo "⚠️ Gemma evaluation results not found" >> report.md
          fi
          
          echo -e "\n---" >> report.md
          echo "**Report Generated**: $(date)" >> report.md
          echo "**Branch**: ${{ github.ref_name }}" >> report.md
          echo "**Commit**: ${{ github.sha }}" >> report.md

      - name: Display report summary
        run: |
          echo "=== IRIS PIPELINE EVALUATION SUMMARY ==="
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          if [ -f "gemma_evaluation_results.json" ]; then
            python scripts/generate_report.py --summary
          fi

      - name: Setup CML
        uses: iterative/setup-cml@v1

      - name: Post report to PR with CML
        if: github.event_name == 'pull_request'
        env:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
        run: cml comment create report.md

      - name: Create GitHub Issue with Report (for pushes)
        if: github.event_name == 'push'
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "🤖 IRIS Pipeline Bot Report - ${{ github.ref_name }} - ${{ github.sha }}"
          content-filepath: report.md
          labels: bot-report, evaluation, gemma-model

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gemma-evaluation-results
          path: |
            gemma_evaluation_results.json
            gemma_metrics.csv
            report.md
          retention-days: 30
