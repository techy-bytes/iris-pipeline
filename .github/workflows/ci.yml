name: CI Pipeline

on:
  # Run on pushes to the dev branch
  push:
    branches: [ dev ]
  # Run on pull requests targeting the main branch
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # cache pip dependencies to speed up future runs

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with pytest
        # The workflow will fail if any tests fail
        run: pytest

      - name: Run training script as a final check
        run: python src/train.py