name: CI/CD Pipeline

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: us-central1
  SERVICE: iris-api
  REGION: us-central1 # Using REGION for consistency

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          pip install -r requirements.txt

      - name: Run tests
        run: |
          echo "## Test Results" > report.md
          # Suppress OpenTelemetry logging errors
          export OTEL_LOGS_EXPORTER=""
          export OTEL_TRACES_EXPORTER=""
          export OTEL_METRICS_EXPORTER=""
          pytest -v >> report.md 2>&1 || true

      - name: Generate training report
        run: |
          echo -e "\n## Training Metrics" >> report.md
          # Suppress OpenTelemetry logging errors
          export OTEL_LOGS_EXPORTER=""
          export OTEL_TRACES_EXPORTER=""
          export OTEL_METRICS_EXPORTER=""
          python src/train.py >> report.md 2>/dev/null

      - name: Generate fairness and SHAP analysis report
        run: |
          echo -e "\n## Fairness Analysis" >> report.md
          if [ -f fairness_analysis.json ]; then
            echo "### Bias Detection Results" >> report.md
            echo '```json' >> report.md
            jq '.fairness_metrics | {overall_accuracy, accuracy_location_0, accuracy_location_1, accuracy_difference}' fairness_analysis.json >> report.md
            echo '```' >> report.md
            echo "" >> report.md
            echo "**Key Findings:**" >> report.md
            # Extract accuracy difference and format as percentage
            BIAS_PERCENT=$(jq -r '.fairness_metrics.accuracy_difference * 100 | floor' fairness_analysis.json)
            echo "- Detected ${BIAS_PERCENT}% accuracy gap between location groups" >> report.md
            echo "- This indicates potential bias that requires attention" >> report.md
            echo "" >> report.md
            echo "### Feature Importance (SHAP-style Analysis)" >> report.md
            echo '```json' >> report.md
            jq '.feature_analysis.feature_importances' fairness_analysis.json >> report.md
            echo '```' >> report.md
            echo "" >> report.md
            echo "**Top Features for Virginica Classification:**" >> report.md
            jq -r '.feature_analysis.top_features[] | "- \(.[0]): \((.[1] * 100 | floor))%"' fairness_analysis.json >> report.md
            echo "" >> report.md
            echo "### Fairness Recommendations" >> report.md
            echo "- Monitor prediction disparities across demographic groups" >> report.md
            echo "- Consider bias mitigation techniques if deploying to production" >> report.md
            echo "- Regular fairness audits recommended for sensitive applications" >> report.md
          else
            echo "Fairness analysis file not found." >> report.md
          fi

      - name: Setup CML
        uses: iterative/setup-cml@v1

      - name: Post report to PR with CML
        if: github.event_name == 'pull_request'
        env:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
        run: cml comment create report.md

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    permissions:
      contents: read # Only read permission is needed here
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Configure Docker to use gcloud as credential helper
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and Push Container
        run: |-
          docker build -t "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/${{ env.SERVICE }}:${{ github.sha }}" ./
          docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/${{ env.SERVICE }}:${{ github.sha }}"

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      issues: write # Permission to create/comment on issues
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Deploy to GKE
        run: |-
          # Install auth plugin
          gcloud components install gke-gcloud-auth-plugin --quiet

          # Get GKE credentials
          gcloud container clusters get-credentials iris-cluster --zone=us-central1-a

          # Update image in Kubernetes manifest robustly
          sed -i "s|image:.*|image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/${{ env.SERVICE }}:${{ github.sha }}|g" k8s/deployment.yaml

          # Apply Kubernetes manifests
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/hpa.yaml

          # Wait for rollout to complete
          kubectl rollout status deployment/iris-api

      - name: Generate deployment report
        run: |
          echo "## Deployment Status" > deploy-report.md
          echo "- **Image**: \`${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/${{ env.SERVICE }}:${{ github.sha }}\`" >> deploy-report.md
          echo "- **Deployment Time**: $(date)" >> deploy-report.md
          echo "- **Commit**: ${{ github.sha }}" >> deploy-report.md
          echo "" >> deploy-report.md
          echo "### Service Status" >> deploy-report.md
          kubectl get pods -l app=iris-api >> deploy-report.md
          echo "" >> deploy-report.md
          kubectl get service iris-api-service >> deploy-report.md

      - name: Create deployment issue
        if: github.event_name == 'push'
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "Deployment Report - ${{ github.sha }}"
          content-filepath: deploy-report.md
          labels: deployment, status
