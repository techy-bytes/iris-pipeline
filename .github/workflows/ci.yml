name: CI/CD Pipeline

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: us-central1
  SERVICE: iris-api
  REGION: us-central1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # cache pip dependencies to speed up future runs

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          echo "## Test Results" > report.md
          pytest -v >> report.md 2>&1 || true

      - name: Generate training report
        run: |
          echo -e "\n## Training Metrics" >> report.md
          python src/train.py >> report.md 2>&1

      - name: Setup CML
        uses: iterative/setup-cml@v1

      - name: Post report to PR with CML
        # This step only runs for pull request events
        if: github.event_name == 'pull_request'
        env:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
        run: cml comment create report.md

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Docker Auth
        id: docker-auth
        uses: 'docker/login-action@v3'
        with:
          username: _json_key
          password: '${{ secrets.GCP_SA_KEY }}'
          registry: '${{ env.GAR_LOCATION }}-docker.pkg.dev'

      - name: Build and Push Container
        run: |-
          docker build -t "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/${{ env.SERVICE }}:${{ github.sha }}" ./
          docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/${{ env.SERVICE }}:${{ github.sha }}"

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Deploy to GKE
        run: |-
          # Update image in Kubernetes manifest
          sed -i "s|PROJECT_ID|${{ env.PROJECT_ID }}|g" k8s/deployment.yaml
          sed -i "s|latest|${{ github.sha }}|g" k8s/deployment.yaml
          
          # Set up kubectl
          gcloud components install gke-gcloud-auth-plugin
          gcloud container clusters get-credentials iris-cluster --region=${{ env.REGION }}
          
          # Apply Kubernetes manifests
          kubectl apply -f k8s/deployment.yaml
          
          # Wait for rollout to complete
          kubectl rollout status deployment/iris-api

      - name: Generate deployment report
        run: |
          echo "## Deployment Status" > deploy-report.md
          echo "- **Image**: \`${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/${{ env.SERVICE }}:${{ github.sha }}\`" >> deploy-report.md
          echo "- **Deployment Time**: $(date)" >> deploy-report.md
          echo "- **Commit**: ${{ github.sha }}" >> deploy-report.md
          echo "" >> deploy-report.md
          echo "### Service Status" >> deploy-report.md
          kubectl get pods -l app=iris-api >> deploy-report.md
          echo "" >> deploy-report.md
          kubectl get service iris-api-service >> deploy-report.md

      - name: Setup CML for deployment report
        uses: iterative/setup-cml@v1

      - name: Post deployment report
        env:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
        run: cml comment create deploy-report.md