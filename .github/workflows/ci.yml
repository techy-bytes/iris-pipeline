name: CI/CD Pipeline

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: us-central1
  SERVICE: iris-api
  REGION: us-central1 # Using REGION for consistency

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          echo "## Test Results" > report.md
          pytest -v >> report.md 2>&1 || true

      - name: Generate training report
        run: |
          echo -e "\n## Traditional Model Training Metrics" >> report.md
          python src/train.py >> report.md 2>&1

      - name: Run Gemma Model Evaluation
        run: |
          echo -e "\n## Gemma Model Evaluation (Base vs Fine-tuned)" >> report.md
          echo "🚀 Running comprehensive Gemma model comparison..." >> report.md
          python src/gemma_evaluation.py >> report.md 2>&1
          
      - name: Generate Gemma comparison charts
        run: |
          echo -e "\n## Gemma Evaluation Results" >> report.md
          if [ -f "gemma_metrics.csv" ]; then
            echo "### Performance Metrics Comparison" >> report.md
            echo "\`\`\`" >> report.md
            cat gemma_metrics.csv >> report.md
            echo "\`\`\`" >> report.md
          fi
          
          if [ -f "gemma_evaluation_results.json" ]; then
            echo -e "\n### Validation Status" >> report.md
            python -c "
import json
with open('gemma_evaluation_results.json', 'r') as f:
    results = json.load(f)
status = '✅ PASSED' if results.get('validation_passed', False) else '❌ FAILED'
print(f'**Gemma Model Validation**: {status}')
print(f'**Accuracy Improvement**: {results[\"improvements\"][\"accuracy_improvement_percent\"]:.2f}%')
print(f'**F1-Score Improvement**: {results[\"improvements\"][\"f1_improvement_percent\"]:.2f}%')
" >> report.md
          fi

      - name: Setup CML
        uses: iterative/setup-cml@v1

      - name: Post report to PR with CML
        if: github.event_name == 'pull_request'
        env:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
        run: cml comment create report.md

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    permissions:
      contents: read # Only read permission is needed here
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Configure Docker to use gcloud as credential helper
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and Push Container
        run: |-
          docker build -t "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/${{ env.SERVICE }}:${{ github.sha }}" ./
          docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/${{ env.SERVICE }}:${{ github.sha }}"

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      issues: write # Permission to create/comment on issues
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Deploy to GKE
        run: |-
          # Install auth plugin
          gcloud components install gke-gcloud-auth-plugin --quiet

          # Get GKE credentials
          gcloud container clusters get-credentials iris-cluster --zone=us-central1-a

          # Update image in Kubernetes manifest robustly
          sed -i "s|image:.*|image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/${{ env.SERVICE }}:${{ github.sha }}|g" k8s/deployment.yaml

          # Apply Kubernetes manifests
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/hpa.yaml

          # Wait for rollout to complete
          kubectl rollout status deployment/iris-api

      - name: Generate deployment report
        run: |
          echo "## Deployment Status" > deploy-report.md
          echo "- **Image**: \`${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE }}/${{ env.SERVICE }}:${{ github.sha }}\`" >> deploy-report.md
          echo "- **Deployment Time**: $(date)" >> deploy-report.md
          echo "- **Commit**: ${{ github.sha }}" >> deploy-report.md
          echo "" >> deploy-report.md
          echo "### Service Status" >> deploy-report.md
          kubectl get pods -l app=iris-api >> deploy-report.md
          echo "" >> deploy-report.md
          kubectl get service iris-api-service >> deploy-report.md
          
          echo "" >> deploy-report.md
          echo "## Gemma Model Evaluation Results" >> deploy-report.md
          if [ -f "gemma_evaluation_results.json" ]; then
            python -c "
import json
with open('gemma_evaluation_results.json', 'r') as f:
    results = json.load(f)

print('### Model Performance Comparison')
print(f'- **Base Gemma 3 Accuracy**: {results[\"base_model_metrics\"][\"accuracy\"]:.4f}')
print(f'- **Fine-tuned Gemma 3 Accuracy**: {results[\"finetuned_model_metrics\"][\"accuracy\"]:.4f}')
print(f'- **Accuracy Improvement**: {results[\"improvements\"][\"accuracy_improvement_percent\"]:.2f}%')
print(f'- **F1-Score Improvement**: {results[\"improvements\"][\"f1_improvement_percent\"]:.2f}%')
print()
print('### Validation Status')
status = '✅ PASSED' if results.get('validation_passed', False) else '❌ FAILED'
print(f'**Pipeline Validation**: {status}')
print(f'**Training Time**: {results.get(\"training_time_seconds\", 0):.2f} seconds')
print(f'**Test Samples**: {results[\"dataset_info\"][\"test_samples\"]}')
" >> deploy-report.md
          else
            echo "⚠️ Gemma evaluation results not found" >> deploy-report.md
          fi

      - name: Create deployment issue
        if: github.event_name == 'push'
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "Deployment Report - ${{ github.sha }}"
          content-filepath: deploy-report.md
          labels: deployment, status
