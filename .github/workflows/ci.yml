name: CI/CD Pipeline

on:
  push:
    branches: [ dev, main, '**' ]  # Run on all branches
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: us-central1
  SERVICE: iris-api
  REGION: us-central1 # Using REGION for consistency

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          echo "# IRIS Pipeline - Model Evaluation Report" > report.md
          echo "" >> report.md
          echo "## Test Results" >> report.md
          pytest -v >> report.md 2>&1 || true

      - name: Generate training report
        run: |
          echo -e "\n## Traditional Model Training Metrics" >> report.md
          python src/train.py >> report.md 2>&1

      - name: Run Gemma Model Evaluation
        run: |
          echo -e "\n## Gemma Model Evaluation (Base vs Fine-tuned)" >> report.md
          echo "🚀 Running comprehensive Gemma model comparison..." >> report.md
          echo "" >> report.md
          python src/gemma_evaluation.py >> report.md 2>&1
          
      - name: Generate comprehensive evaluation metrics
        run: |
          echo -e "\n## Evaluation Metrics Comparing Base and Fine-tuned Model" >> report.md
          echo "" >> report.md
          if [ -f "gemma_metrics.csv" ]; then
            echo "### Performance Metrics Comparison" >> report.md
            echo "\`\`\`csv" >> report.md
            cat gemma_metrics.csv >> report.md
            echo "\`\`\`" >> report.md
            echo "" >> report.md
          fi
          
          if [ -f "gemma_evaluation_results.json" ]; then
            echo "### Detailed Evaluation Results" >> report.md
            python -c "
import json
with open('gemma_evaluation_results.json', 'r') as f:
    results = json.load(f)

print('#### Base Gemma 3 Model Performance:')
base_metrics = results['base_model_metrics']
print(f'- **Accuracy**: {base_metrics[\"accuracy\"]:.4f}')
print(f'- **Precision**: {base_metrics[\"precision\"]:.4f}')
print(f'- **Recall**: {base_metrics[\"recall\"]:.4f}')
print(f'- **F1-Score**: {base_metrics[\"f1_score\"]:.4f}')
print(f'- **Average Confidence**: {base_metrics[\"average_confidence\"]:.4f}')
print()
print('#### Fine-tuned Gemma 3 Model Performance:')
ft_metrics = results['finetuned_model_metrics']
print(f'- **Accuracy**: {ft_metrics[\"accuracy\"]:.4f}')
print(f'- **Precision**: {ft_metrics[\"precision\"]:.4f}')
print(f'- **Recall**: {ft_metrics[\"recall\"]:.4f}')
print(f'- **F1-Score**: {ft_metrics[\"f1_score\"]:.4f}')
print(f'- **Average Confidence**: {ft_metrics[\"average_confidence\"]:.4f}')
print()
print('#### Performance Improvements:')
improvements = results['improvements']
print(f'- **Accuracy Improvement**: {improvements[\"accuracy_improvement_percent\"]:+.2f}%')
print(f'- **Precision Improvement**: {improvements[\"precision_improvement_percent\"]:+.2f}%')
print(f'- **Recall Improvement**: {improvements[\"recall_improvement_percent\"]:+.2f}%')
print(f'- **F1-Score Improvement**: {improvements[\"f1_improvement_percent\"]:+.2f}%')
print()
status = '✅ PASSED' if results.get('validation_passed', False) else '❌ FAILED'
print(f'#### Validation Status: {status}')
print(f'- **Training Time**: {results.get(\"training_time_seconds\", 0):.2f} seconds')
print(f'- **Test Samples**: {results[\"dataset_info\"][\"test_samples\"]}')
print(f'- **Training Samples**: {results[\"dataset_info\"][\"training_samples\"]}')
print(f'- **Total Dataset Size**: {results[\"dataset_info\"][\"total_samples\"]}')
" >> report.md
          else
            echo "⚠️ Gemma evaluation results not found" >> report.md
          fi
          
          echo -e "\n---" >> report.md
          echo "**Report Generated**: $(date)" >> report.md
          echo "**Branch**: ${{ github.ref_name }}" >> report.md
          echo "**Commit**: ${{ github.sha }}" >> report.md

      - name: Display report summary
        run: |
          echo "=== IRIS PIPELINE EVALUATION SUMMARY ==="
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          if [ -f "gemma_evaluation_results.json" ]; then
            python -c "
import json
with open('gemma_evaluation_results.json', 'r') as f:
    results = json.load(f)
status = 'PASSED' if results.get('validation_passed', False) else 'FAILED'
print(f'Gemma Model Evaluation: {status}')
print(f'Accuracy Improvement: {results[\"improvements\"][\"accuracy_improvement_percent\"]:+.2f}%')
print(f'F1-Score Improvement: {results[\"improvements\"][\"f1_improvement_percent\"]:+.2f}%')
"
          fi

      - name: Setup CML
        uses: iterative/setup-cml@v1

      - name: Post report to PR with CML
        if: github.event_name == 'pull_request'
        env:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
        run: cml comment create report.md

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gemma-evaluation-results
          path: |
            gemma_evaluation_results.json
            gemma_metrics.csv
            report.md
          retention-days: 30
